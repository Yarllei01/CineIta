<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinemaIta</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>🎬 Grade atualizada do Cinema de Itabaiana</h1>
        <div class="abas">
            <button class="aba ativa" id="aba-cartaz">Em Cartaz</button>
            <button class="aba" id="aba-breve">Em Breve</button>
        </div>
    </header>

    <main>
        <section class="seletor-datas" id="seletor-datas">
            <button class="btn-data ativo">Hoje</button>
            <button class="btn-data">Sexta</button>
            <button class="btn-data">Sáb</button>
        </section>

        <section id="lista-filmes" class="lista-filmes">
            
            <div class="filme-card">
                <img src="https://via.placeholder.com/100x150" alt="Pôster do Filme" class="filme-poster">
                <div class="filme-info">
                    <h2>Nome do Filme Exemplo</h2>
                    <p class="detalhes">1h 45m | Ação / Aventura</p>
                    <p class="formato-classificacao">
                        <span class="tag-formato">Dublado 3D</span>
                        <span class="tag-classificacao">12 Anos</span>
                    </p>
                    <div class="horarios">
                        <span class="horario-badge">19:00</span>
                        <span class="horario-badge">21:30</span>
                    </div>
                </div>
            </div>
            </section>
        
        <button id="btn-compartilhar" class="btn-compartilhar">
            📱 Compartilhar Horários
        </button>
    </main>

    <footer>
        <p>Atualizado hoje às 08:00</p>
    </footer>

    </body>
</html>
